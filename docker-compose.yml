services:
  konomi:
    image: konomi:latest
    build: .
    container_name: konomi
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - KONOMI_DATA_ROOT=/images
      - PUID=911
      - PGID=911
      - TZ=Asia/Seoul
    volumes:
      # Mount host image directories into /images
      # Each subdirectory becomes a selectable folder in the UI
      - /path/to/your/images:/images:ro
      # Persistent config + MariaDB data
      - konomi_data:/config

volumes:
  konomi_data:
