services:
  konomi:
    image: konomi:latest
    build: .
    container_name: konomi
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - KONOMI_DATA_ROOT=/images
      # Required: set to the host UID/GID that owns the /images mount.
      # See docs/docker.md → "Finding your UID / GID".
      - PUID=0
      - PGID=0
      - TZ=Asia/Seoul
    volumes:
      # Mount host image directories into /images
      # Each subdirectory becomes a selectable folder in the UI
      - /path/to/your/images:/images:ro
      # Persistent config + Database data
      - konomi_data:/config

volumes:
  konomi_data:
