appId: com.electron.konomi
productName: Konomi

directories:
  buildResources: build

files:
  - '!**/.vscode/*'
  - '!**/.git/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,README.dev.md,README.dev.ko.md,README.ko.md,CLAUDE.md,debug.ts}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{docs/**,examples/**,example_datas/**,.claude/**,scripts/**}'
  - '!out/*.db'
  - '!resources/prompts.db'
  - '!node_modules/better-sqlite3/deps/**'
  - '!node_modules/better-sqlite3/src/**'
  - '!node_modules/better-sqlite3/README.md'
  - '!node_modules/better-sqlite3/binding.gyp'
  - '!node_modules/@prisma/client/generator-build/**'
  - '!node_modules/@prisma/client/scripts/**'
  - '!node_modules/@prisma/client/runtime/*.map'
  - '!node_modules/@prisma/client/runtime/wasm-compiler-edge.*'
  - '!node_modules/@prisma/client/runtime/index-browser.*'
  - '!node_modules/@prisma/client/runtime/query_compiler_fast_bg.cockroachdb.*'
  - '!node_modules/@prisma/client/runtime/query_compiler_fast_bg.mysql.*'
  - '!node_modules/@prisma/client/runtime/query_compiler_fast_bg.postgresql.*'
  - '!node_modules/@prisma/client/runtime/query_compiler_fast_bg.sqlserver.*'
  - '!node_modules/@prisma/client/runtime/query_compiler_small_bg.*'

extraResources:
  - from: resources
    to: .
    filter:
      - prompts.db

win:
  executableName: konomi
  icon: build/icon.ico
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always

mac:
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false

linux:
  target:
    - AppImage
    - deb
  category: Utility

npmRebuild: false
electronLanguages:
  - en-US
  - ko
  - ja

publish:
  provider: generic
  url: https://example.com/auto-updates
