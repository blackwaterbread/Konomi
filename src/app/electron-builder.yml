appId: com.electron.konomi
productName: Konomi

directories:
  buildResources: build

files:
  - '!**/.vscode/*'
  - '!**/.git/*'
  - '!src/core/**'
  - '!src/app/**'
  - '!src/web/**'
  - '!src/server/**'
  - '!src/native/**'
  - '!dist/**'
  - '!dist-*/**'
  - '!tmp/**'
  - '!database/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,README.dev.md,README.dev.ko.md,README.ko.md,CLAUDE.md,debug.ts}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!tsconfig.json'
  - '!{docs/**,examples/**,example_datas/**,.claude/**,scripts/**}'
  - '!**/*.tsbuildinfo'
  - '!prisma.config.ts'
  - '!prisma/schema/sqlite.prisma'
  - '!out/*.db'
  - '!resources/**'
  - '!node_modules/better-sqlite3/deps/**'
  - '!node_modules/better-sqlite3/src/**'
  - '!node_modules/better-sqlite3/README.md'
  - '!node_modules/better-sqlite3/binding.gyp'
  - '!node_modules/prebuild-install/**'
  - '!node_modules/tar-fs/**'
  - '!node_modules/tar-stream/**'
  - '!node_modules/simple-get/**'
  - '!node_modules/simple-concat/**'
  - '!node_modules/decompress-response/**'
  - '!node_modules/mimic-response/**'
  - '!node_modules/node-abi/**'
  - '!node_modules/napi-build-utils/**'
  - '!node_modules/expand-template/**'
  - '!node_modules/github-from-package/**'
  - '!node_modules/mkdirp-classic/**'
  - '!node_modules/rc/**'
  - '!node_modules/deep-extend/**'
  - '!node_modules/ini/**'
  - '!node_modules/detect-libc/**'
  - '!node_modules/chownr/**'
  - '!node_modules/end-of-stream/**'
  - '!node_modules/pump/**'
  - '!node_modules/once/**'
  - '!node_modules/wrappy/**'
  - '!node_modules/minimist/**'
  - '!node_modules/tunnel-agent/**'
  - '!node_modules/bl/**'
  - '!node_modules/readable-stream/**'
  - '!node_modules/string_decoder/**'
  - '!node_modules/buffer/**'
  - '!node_modules/base64-js/**'
  - '!node_modules/ieee754/**'
  - '!node_modules/util-deprecate/**'
  - '!node_modules/safe-buffer/**'
  - '!node_modules/strip-json-comments/**'
  - '!node_modules/fs-constants/**'
  - '!node_modules/inherits/**'
  - '!node_modules/@prisma/client/generator-build/**'
  - '!node_modules/@prisma/client/scripts/**'
  - '!node_modules/@prisma/client/runtime/*.map'
  - '!node_modules/@prisma/client/runtime/wasm-compiler-edge.*'
  - '!node_modules/@prisma/client/runtime/index-browser.*'
  - '!node_modules/@prisma/client/runtime/query_compiler_fast_bg.cockroachdb.*'
  - '!node_modules/@prisma/client/runtime/query_compiler_fast_bg.mysql.*'
  - '!node_modules/@prisma/client/runtime/query_compiler_fast_bg.postgresql.*'
  - '!node_modules/@prisma/client/runtime/query_compiler_fast_bg.sqlserver.*'
  - '!node_modules/@prisma/client/runtime/query_compiler_small_bg.*'

extraResources:
  - from: database
    to: .
    filter:
      - prompts.db

win:
  executableName: konomi
  icon: build/icon.ico
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  include: installer.nsh

mac:
  icon: build/icon.icns
  notarize: false

linux:
  target:
    - AppImage
    - deb
  category: Utility

asarUnpack:
  - "prebuilds/**"

npmRebuild: false
electronLanguages:
  - en-US
  - ko

publish:
  provider: github
  owner: blackwaterbread
  repo: Konomi
