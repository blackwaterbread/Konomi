name: Build Native Addon

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
          - os: macos-15-intel # available until August 2027
            platform: darwin-x64
          - os: macos-14
            platform: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install libwebp:x64-windows-static libpng:x64-windows-static
          echo "LIBWEBP_ROOT=C:/vcpkg/installed/x64-windows-static" >> $env:GITHUB_ENV
          echo "LIBPNG_ROOT=C:/vcpkg/installed/x64-windows-static" >> $env:GITHUB_ENV

      - name: Install libraries (macOS)
        if: runner.os == 'macOS'
        run: brew install webp libpng

      - name: Build native addons
        run: bun run prebuild:native

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.platform }}
          path: src/native/prebuilds/${{ matrix.platform }}/

  commit:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: prebuilds-artifacts

      - name: Move artifacts into prebuilds/
        run: |
          for dir in prebuilds-artifacts/*/; do
            platform=$(basename "$dir")
            mkdir -p "src/native/prebuilds/$platform"
            cp "$dir"*.node "src/native/prebuilds/$platform/"
          done

      - name: Commit prebuilds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/native/prebuilds/
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "build: update prebuilt native addon binaries [skip ci]"
            git push
          )
